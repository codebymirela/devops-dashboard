<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Status do Sistema</title>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; padding: 40px 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 25px; border: 2px solid #ffb6c1; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); }
        h2 { color: #db7093; text-align: center; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .metric-box { background: #fffafa; padding: 20px; margin-bottom: 20px; border-radius: 15px; border-left: 5px solid #ff69b4; }
        .label-group { display: flex; justify-content: space-between; font-weight: bold; color: #4b0082; }
        .bar-container { background: #eee; border-radius: 10px; height: 16px; margin-top: 10px; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, #ffb6c1, #ff69b4); height: 100%; transition: width 1s ease; width: var(--porcentagem); }
        .info-text { text-align: center; color: #888; font-size: 0.85em; margin-top: 25px; border-top: 1px solid #fff0f5; padding-top: 15px; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #ff69b4; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="hgi hgi-stroke hgi-health"></i> Monitoramento em Tempo Real</h2>
        {% for label, valor in [('CPU', dados.cpu), ('RAM', dados.memoria), ('Disco', dados.discos)] %}
        <div class="metric-box">
            <div class="label-group"><span>{{ label }}</span><span>{{ valor }}%</span></div>
            <div class="bar-container"><div class="bar-fill" style="--porcentagem: {{ valor }}%;"></div></div>
        </div>
        {% endfor %}
        <div class="info-text">Sistema: {{ dados.so }} {{ dados.versao }}</div>
        <a href="/menu" class="back-link">← Voltar ao Menu</a>
    </div>
    <script>setTimeout(() => { location.reload(); }, 3000);</script>
</body>
</html>
