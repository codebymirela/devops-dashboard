<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AWS Manager | DevOps Dashboard</title>
    <link rel="stylesheet" href="https://cdn.hugeicons.com/font/hgi-stroke-rounded.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; padding: 40px 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 25px; border: 2px solid #ffb6c1; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); }
        h2 { color: #db7093; text-align: center; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #fffafa; color: #db7093; padding: 15px; text-align: left; border-bottom: 2px solid #ffb6c1; }
        td { padding: 15px; border-bottom: 1px solid #fff0f5; color: #4b0082; font-size: 0.95em; }
        .status-pill { padding: 6px 14px; border-radius: 20px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .running { background-color: #e0ffe0; color: #2e8b57; border: 1px solid #98fb98; }
        .stopped { background-color: #ffe0e0; color: #cd5c5c; border: 1px solid #ffb6c1; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: #ff69b4; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="hgi hgi-stroke hgi-cloud"></i> Instâncias EC2 (AWS)</h2>
        <table>
            <thead>
                <tr>
                    <th>Tag Name / ID</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th>IP Público</th>
                </tr>
            </thead>
            <tbody>
                {% for instancia in instancias %}
                <tr>
                    <td><strong>{{ instancia.name }}</strong><br><small style="color: #aaa;">{{ instancia.id }}</small></td>
                    <td><code>{{ instancia.type }}</code></td>
                    <td><span class="status-pill {{ 'running' if instancia.state == 'running' else 'stopped' }}">{{ instancia.state }}</span></td>
                    <td>{{ instancia.ip }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align: center; padding: 40px; color: #888;">Nenhuma instância encontrada nesta região.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/menu" class="back-link">← Voltar ao Menu Principal</a>
    </div>
</body>
</html>
